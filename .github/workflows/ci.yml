name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # Los plugins se desarrollan dentro del monorepo Coongro (pnpm workspaces).
      # En CI standalone:
      # - Removemos .npmrc (apunta a Verdaccio local)
      # - Reemplazamos workspace:* con la versión del SDK publicada en Verdaccio
      # - plugin-sdk ya está en peerDependencies, npm install lo ignora
      - name: Prepare for standalone CI
        run: |
          rm -f .npmrc
          sed -i 's/"workspace:\*"/">=0.1.0"/g' package.json

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
